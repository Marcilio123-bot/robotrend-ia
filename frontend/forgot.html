<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recuperar senha · Robotrend IA</title>
  <link rel="stylesheet" href="/output.css">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body class="font-display antialiased min-h-screen grid place-items-center px-4">
  <div class="bg-aurora"></div>
  <div class="bg-grid"></div>

  <div class="w-full max-w-md relative">
    <a href="/login.html" class="absolute -top-12 left-0 text-xs" style="color: var(--muted);">← login</a>
    <div class="rounded-2xl p-8 border" style="background: var(--card-bg); border-color: var(--card-border); box-shadow: var(--shadow-card);">

      <h1 class="text-2xl font-extrabold mb-1">Recuperar senha</h1>
      <p class="text-sm mb-6" style="color: var(--muted);">Enviaremos um link para sua caixa de entrada.</p>

      <form id="forgot-form" class="space-y-3">
        <input id="email" type="email" required class="w-full px-4 py-3 rounded-lg border text-sm" style="background: var(--surface-2); border-color: var(--line); color: var(--text);" placeholder="seu@email.com" />
        <button type="submit" class="btn-primary w-full justify-center py-3">Enviar link</button>
      </form>

      <div id="msg" class="mt-3 text-sm hidden p-3 rounded-lg"></div>
    </div>
  </div>

  <script src="/js/auth.js"></script>
  <script>
    const form = document.getElementById('forgot-form');
    const msg = document.getElementById('msg');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      msg.classList.add('hidden');
      try {
        const r = await RobotrendAuth.api('/api/auth/forgot', {
          method: 'POST', body: JSON.stringify({ email: (document.getElementById('email')?.value || '').trim().toLowerCase() })
        });
        msg.className = 'mt-3 text-sm p-3 rounded-lg';
        msg.style.background = 'rgba(20,184,94,0.1)';
        msg.style.color = '#aafdd4';
        msg.style.border = '1px solid rgba(20,184,94,0.4)';
        msg.innerHTML = r.message + (r.devLink ? `<br/><a href="${r.devLink}" style="color:#00ff9d">${r.devLink}</a>` : '');
        msg.classList.remove('hidden');
      } catch (ex) {
        msg.textContent = ex.message;
        msg.classList.remove('hidden');
      }
    });
  </script>
</body>
</html>
