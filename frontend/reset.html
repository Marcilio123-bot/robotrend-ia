<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redefinir senha · Robotrend IA</title>
  <link rel="stylesheet" href="/output.css">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body class="font-display antialiased min-h-screen grid place-items-center px-4">
  <div class="bg-aurora"></div>
  <div class="bg-grid"></div>

  <div class="w-full max-w-md relative">
    <div class="rounded-2xl p-8 border" style="background: var(--card-bg); border-color: var(--card-border); box-shadow: var(--shadow-card);">
      <h1 class="text-2xl font-extrabold mb-1">Nova senha</h1>
      <p class="text-sm mb-6" style="color: var(--muted);">Digite sua nova senha abaixo.</p>

      <form id="reset-form" class="space-y-3">
        <input id="password" type="password" required minlength="6" class="w-full px-4 py-3 rounded-lg border text-sm" style="background: var(--surface-2); border-color: var(--line); color: var(--text);" placeholder="Nova senha (mín. 6)" />
        <button type="submit" class="btn-primary w-full justify-center py-3">Salvar nova senha</button>
      </form>

      <div id="msg" class="mt-3 text-sm hidden p-3 rounded-lg"></div>
    </div>
  </div>

  <script src="/js/auth.js"></script>
  <script>
    const form = document.getElementById('reset-form');
    const msg = document.getElementById('msg');
    const token = new URLSearchParams(location.search).get('token');
    if (!token) {
      msg.textContent = 'Token ausente.';
      msg.classList.remove('hidden');
      msg.className = 'mt-3 text-sm p-3 rounded-lg';
      msg.style.background = 'rgba(255,85,102,0.1)';
      msg.style.color = '#ffd1d6';
      msg.style.border = '1px solid rgba(255,85,102,0.4)';
    }
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      msg.classList.add('hidden');
      try {
        const pwd = (password?.value || '').trim();
        if (!pwd || pwd.length < 6) {
          throw new Error('Senha deve ter no mínimo 6 caracteres.');
        }
        await RobotrendAuth.api('/api/auth/reset', {
          method: 'POST', body: JSON.stringify({ token, password: pwd })
        });
        location.href = '/login.html?reset=1';
      } catch (ex) {
        msg.textContent = ex.message;
        msg.classList.remove('hidden');
        msg.className = 'mt-3 text-sm p-3 rounded-lg';
        msg.style.background = 'rgba(255,85,102,0.1)';
        msg.style.color = '#ffd1d6';
        msg.style.border = '1px solid rgba(255,85,102,0.4)';
      }
    });
  </script>
</body>
</html>
