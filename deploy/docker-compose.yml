# Robotrend IA — Docker Compose (rodar da raiz do projeto)
# Uso: npm run docker:up
# ou: docker compose -f deploy/docker-compose.yml --env-file .env up -d --build

services:
  app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: robotrend
    restart: unless-stopped
    ports:
      - "3010:3010"
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgres://robotrend:${POSTGRES_PASSWORD:-robotrend}@db:5432/robotrend
      DEMO_MODE: "${DEMO_MODE:-false}"
      NODE_ENV: "${NODE_ENV:-production}"
    depends_on:
      db:
        condition: service_healthy
    networks: [robotrend]

  db:
    image: postgres:16-alpine
    container_name: robotrend-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: robotrend
      POSTGRES_USER: robotrend
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-robotrend}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "robotrend"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [robotrend]

  nginx:
    image: nginx:alpine
    container_name: robotrend-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on: [app]
    networks: [robotrend]

networks:
  robotrend:

volumes:
  pgdata:
