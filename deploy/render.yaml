# Robotrend IA v5 — Render.com blueprint
#
# JWT_SECRET e SESSION_SECRET: sync false — cole valores de `npm run secrets:render`
# (hex 128 chars). NÃO use placeholders curtos no painel Environment.
# WEBHOOK_SECRET / METRICS_TOKEN / BOOTSTRAP_ADMIN_PASSWORD: generateValue (~44 chars base64).
#
# O Render injeta automaticamente RENDER_EXTERNAL_URL no Web Service.
# O backend usa essa URL para CORS/APP_URL se ALLOWED_ORIGINS não estiver definido.
#
# Obrigatório preencher manualmente (sync: false):
#   - BOOTSTRAP_ADMIN_EMAIL
#
# Opcional (recomendado; senão usa RENDER_EXTERNAL_URL):
#   - ALLOWED_ORIGINS, APP_URL, PUBLIC_URL
# E opcionalmente: API_FOOTBALL_KEY, MP_*, STRIPE_*, TELEGRAM_*.

services:
  - type: web
    name: robotrend-ia
    env: node
    plan: starter
    region: oregon
    branch: main
    healthCheckPath: /healthz
    autoDeploy: true
    buildCommand: npm install && npm run tailwind:build
    startCommand: node backend/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3010
      - key: PGSSL
        value: "true"
      - key: DEMO_MODE
        value: "false"
      - key: ANTI_FAKE_PRESSURE
        value: "true"
      - key: ML_AUTOTUNE
        value: "true"
      - key: SIGNAL_MIN_SCORE
        value: "80"
      - key: LIVE_SCAN_INTERVAL_MS
        value: "15000"
      - key: BCRYPT_ROUNDS
        value: "12"
      - key: RATE_LIMIT_WINDOW_MS
        value: "60000"
      - key: RATE_LIMIT_MAX
        value: "120"
      - key: JWT_EXPIRES_IN
        value: "7d"
      - key: TZ
        value: America/Sao_Paulo
      # Assinatura JWT / sessão — obrigatório colar no primeiro deploy (mín. 32, ideal 128 hex)
      - key: JWT_SECRET
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: WEBHOOK_SECRET
        generateValue: true
      - key: METRICS_TOKEN
        generateValue: true
      - key: BOOTSTRAP_ADMIN_EMAIL
        sync: false
      - key: BOOTSTRAP_ADMIN_PASSWORD
        generateValue: true
      # CORS / URLs — opcionais: startup-check usa RENDER_EXTERNAL_URL como fallback
      - key: ALLOWED_ORIGINS
        sync: false
      - key: APP_URL
        sync: false
      - key: PUBLIC_URL
        sync: false
      # Render define automaticamente (não declarar aqui):
      # RENDER_EXTERNAL_URL, RENDER_SERVICE_URL
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: TELEGRAM_ENABLED
        value: "false"
      - key: API_FOOTBALL_KEY
        sync: false
      - key: ODDS_API_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: MP_ACCESS_TOKEN
        sync: false
      - key: MP_PUBLIC_KEY
        sync: false
      - key: MP_WEBHOOK_SECRET
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: robotrend-pg
          property: connectionString

databases:
  - name: robotrend-pg
    plan: starter
    databaseName: robotrend
    user: robotrend
    region: oregon
