# Robotrend IA v5 — Render.com blueprint
# Configurar JWT_SECRET, SESSION_SECRET, BOOTSTRAP_ADMIN_PASSWORD,
# ALLOWED_ORIGINS e demais secrets no dashboard antes do primeiro deploy.

services:
  - type: web
    name: robotrend-ia
    env: node
    plan: starter
    region: oregon
    branch: main
    healthCheckPath: /healthz
    autoDeploy: true
    buildCommand: npm install && npm run tailwind:build
    startCommand: node backend/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3010
      - key: DEMO_MODE
        value: "false"
      - key: ANTI_FAKE_PRESSURE
        value: "true"
      - key: ML_AUTOTUNE
        value: "true"
      - key: SIGNAL_MIN_SCORE
        value: "80"
      - key: LIVE_SCAN_INTERVAL_MS
        value: "15000"
      - key: BCRYPT_ROUNDS
        value: "12"
      - key: RATE_LIMIT_WINDOW_MS
        value: "60000"
      - key: RATE_LIMIT_MAX
        value: "120"
      - key: JWT_EXPIRES_IN
        value: "7d"
      - key: TZ
        value: America/Sao_Paulo
      - key: JWT_SECRET
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: BOOTSTRAP_ADMIN_EMAIL
        sync: false
      - key: BOOTSTRAP_ADMIN_PASSWORD
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: PUBLIC_URL
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: TELEGRAM_ENABLED
        value: "false"
      - key: API_FOOTBALL_KEY
        sync: false
      - key: ODDS_API_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: MP_ACCESS_TOKEN
        sync: false
      - key: MP_PUBLIC_KEY
        sync: false
      - key: MP_WEBHOOK_SECRET
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: robotrend-pg
          property: connectionString

databases:
  - name: robotrend-pg
    plan: starter
    databaseName: robotrend
    user: robotrend
    region: oregon
