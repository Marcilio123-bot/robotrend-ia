# Robotrend IA v5 — Render.com blueprint
#
# Secrets fortes (JWT_SECRET, SESSION_SECRET, WEBHOOK_SECRET, METRICS_TOKEN
# e BOOTSTRAP_ADMIN_PASSWORD) são gerados AUTOMATICAMENTE pelo Render no
# primeiro deploy via `generateValue: true`.
#
# Após o primeiro deploy, preencha no painel Environment:
#   - BOOTSTRAP_ADMIN_EMAIL  (e-mail do super-admin)
#   - ALLOWED_ORIGINS        (https://<seu-app>.onrender.com)
#   - APP_URL                (idem)
#   - PUBLIC_URL             (idem)
# E opcionalmente: API_FOOTBALL_KEY, MP_*, STRIPE_*, TELEGRAM_*.

services:
  - type: web
    name: robotrend-ia
    env: node
    plan: starter
    region: oregon
    branch: main
    healthCheckPath: /healthz
    autoDeploy: true
    buildCommand: npm install && npm run tailwind:build
    startCommand: node backend/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3010
      - key: PGSSL
        value: "true"
      - key: DEMO_MODE
        value: "false"
      - key: ANTI_FAKE_PRESSURE
        value: "true"
      - key: ML_AUTOTUNE
        value: "true"
      - key: SIGNAL_MIN_SCORE
        value: "80"
      - key: LIVE_SCAN_INTERVAL_MS
        value: "15000"
      - key: BCRYPT_ROUNDS
        value: "12"
      - key: RATE_LIMIT_WINDOW_MS
        value: "60000"
      - key: RATE_LIMIT_MAX
        value: "120"
      - key: JWT_EXPIRES_IN
        value: "7d"
      - key: TZ
        value: America/Sao_Paulo
      # Secrets gerados automaticamente pelo Render no primeiro deploy
      # (não aparecem nos logs e ficam persistidos no painel "Environment").
      - key: JWT_SECRET
        generateValue: true
      - key: SESSION_SECRET
        generateValue: true
      - key: WEBHOOK_SECRET
        generateValue: true
      - key: METRICS_TOKEN
        generateValue: true
      - key: BOOTSTRAP_ADMIN_EMAIL
        sync: false
      - key: BOOTSTRAP_ADMIN_PASSWORD
        generateValue: true
      # CORS / URLs públicas — preencher após primeiro deploy (URL do Render)
      - key: ALLOWED_ORIGINS
        sync: false
      - key: APP_URL
        sync: false
      - key: PUBLIC_URL
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: TELEGRAM_ENABLED
        value: "false"
      - key: API_FOOTBALL_KEY
        sync: false
      - key: ODDS_API_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: MP_ACCESS_TOKEN
        sync: false
      - key: MP_PUBLIC_KEY
        sync: false
      - key: MP_WEBHOOK_SECRET
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: robotrend-pg
          property: connectionString

databases:
  - name: robotrend-pg
    plan: starter
    databaseName: robotrend
    user: robotrend
    region: oregon
